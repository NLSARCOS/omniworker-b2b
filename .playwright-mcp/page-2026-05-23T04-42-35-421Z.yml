        - generic [ref=e193]:
          - generic [ref=e194]:
            - heading "¿Mis datos salen de mi servidor?" [level=3] [ref=e195]
            - paragraph [ref=e196]: No. Todo el procesamiento se ejecuta localmente en tu infraestructura. El gateway en la nube solo se usa para enrutamiento inteligente de modelos de alta complejidad, y puedes desactivarlo completamente.
          - generic [ref=e197]:
            - heading "¿Qué tipo de tareas pueden ejecutar los agentes?" [level=3] [ref=e198]
            - paragraph [ref=e199]: "Cualquier tarea que puedas describir paso a paso: procesar facturas, responder correos con cotizaciones, sincronizar bases de datos, generar reportes, actualizar CRMs, gestionar tickets de soporte y más."
          - generic [ref=e200]:
            - heading "¿Necesito un equipo técnico para configurarlo?" [level=3] [ref=e201]
            - paragraph [ref=e202]: No. Las instrucciones se escriben en lenguaje natural. Si puedes explicar un proceso a un empleado nuevo, puedes configurar un agente de OmniWorker.
          - generic [ref=e203]:
            - heading "¿Qué pasa si el agente comete un error?" [level=3] [ref=e204]
            - paragraph [ref=e205]: Cada acción se registra en un log inmutable. Puedes configurar reglas de validación, límites de aprobación y alertas para que revises decisiones críticas antes de que se ejecuten.
