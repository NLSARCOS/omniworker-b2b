name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for OmniWorker — traces conversations, LLM calls, and tool usage. Opt-in via `omniworker plugins enable observability/langfuse` or `omniworker tools → Langfuse Observability`."
author: OmniWorker
requires_env:
  - OMNIWORKER_LANGFUSE_PUBLIC_KEY
  - OMNIWORKER_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
