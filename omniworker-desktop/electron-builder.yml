appId: com.omniworker.omniworker
productName: OmniWorker Agent
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!**/*.dmg"
  - "!**/*.zip"
  - "!resources/engine/slm.gguf"
  - "!tests/**"
  - "!.agents/**"
  - "!.claude/**"
  - "!docs/**"
  - "!scripts/**"
  - "!CONTRIBUTING*"
  - "!screenshot.png"
asarUnpack:
  - resources/local-llm-scripts/**
  - resources/engine/llama-server
extraResources:
  - from: "resources/omniworker-office"
    to: "omniworker-office"
    filter:
      - "**/*"
  - from: "resources/engine"
    to: "engine"
    filter:
      - "llama-server"
      - "slm.gguf"
  - from: "resources/local-llm-scripts"
    to: "local-llm-scripts"
    filter:
      - "**/*"

win:
  executableName: omniworker-agent
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: true
  perMachine: false
mac:
  artifactName: ${name}-${version}-${arch}-${os}.${ext}
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - snap
    - deb
    - rpm
  maintainer: electronjs.org
  vendor: Nous Research
  category: Utility
  synopsis: Self-improving AI assistant desktop app
  description: >-
    OmniWorker Desktop is a native desktop app for installing, configuring, and chatting
    with OmniWorker Agent — a self-improving AI assistant with tool use, multi-platform
    messaging, and a closed learning loop.
appImage:
  artifactName: ${name}-${version}.${ext}
rpm:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Simplex-lat
  repo: omniworker-releases
